name: "ISO5055 Security Assessment"

on:
  # Nightly scan
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily

  # Manual trigger
  workflow_dispatch:
    inputs:
      severity_filter:
        description: 'Severity level to fix (for Milestone 2)'
        required: true
        default: 'mandatory'
        type: choice
        options:
          - mandatory
          - optional
          - potential
          - all

permissions:
  contents: read
  issues: write

jobs:
  create-assessment-issue:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      issue_url: ${{ steps.create-issue.outputs.issue_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create labels if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "security" --color "d73a4a" --description "Security related" 2>/dev/null || true
          gh label create "iso5055" --color "0052cc" --description "ISO 5055 compliance" 2>/dev/null || true
          gh label create "automated" --color "bfd4f2" --description "Automatically generated" 2>/dev/null || true
          gh label create "copilot" --color "7057ff" --description "For Copilot to handle" 2>/dev/null || true

      - name: Create GitHub Issue for Copilot
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEVERITY_FILTER: ${{ inputs.severity_filter || 'mandatory' }}
        run: |
          TITLE="🔒 [ISO5055] Run Security Assessment for this repository"

          cat > issue_body.md << 'EOF'
          ## 🎯 Task for Copilot

          Please perform an ISO 5055 security assessment on this repository.

          ### Instructions

          1. **Run the security assessment tool:**
             ```
             Call tool: appmod-iso5055-security-assessment
             ```
             This tool will analyze the codebase for security vulnerabilities based on ISO 5055 standards.

          2. **Report the findings back to this issue** with:
             - Summary table (count by severity: mandatory, optional, potential, information)
             - List of findings filtered by **${SEVERITY_FILTER^^}** severity level
             - For each finding include:
               - CWE ID and name
               - Category
               - Severity
               - Description
               - Evidence (file path and line number)

          3. **Format the report** like this:

          ### 📊 Summary

          | Severity | Count |
          |----------|-------|
          | 🔴 Mandatory | X |
          | 🟠 Optional | X |
          | 🟡 Potential | X |
          | 🔵 Information | X |

          ### 🔴 Mandatory Findings

          #### CWE-XXX: Finding Name
          - **Category:** ...
          - **Evidence:** `file/path.java:line` - description

          ---

          **Severity Filter:** Only report findings at **${SEVERITY_FILTER^^}** level or higher.

          **Repository:** ${{ github.repository }}
          **Triggered:** ${{ github.event_name }} on $(date -u +"%Y-%m-%d %H:%M UTC")
          EOF

          # Replace env var in the file
          sed -i "s/\${SEVERITY_FILTER^^}/${SEVERITY_FILTER^^}/g" issue_body.md

          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body-file issue_body.md \
            --label "security,iso5055,automated,copilot")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

          echo "✅ Created issue #$ISSUE_NUMBER: $ISSUE_URL"

      - name: Assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"

          # Assign Copilot to the issue
          gh issue edit "$ISSUE_NUMBER" --add-assignee "copilot" || echo "Note: Direct assignment may require different syntax"

          echo "✅ Assigned Copilot to issue #$ISSUE_NUMBER"

      - name: Summary
        run: |
          echo "## 📋 ISO5055 Security Assessment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Issue Created:** #${{ steps.create-issue.outputs.issue_number }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** ${{ steps.create-issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY
          echo "🤖 **Copilot:** Assigned to run security assessment" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Severity Filter:** ${{ inputs.severity_filter || 'mandatory' }}" >> $GITHUB_STEP_SUMMARY
