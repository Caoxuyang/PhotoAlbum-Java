name: "Evergreen Code Health Assessment"

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      assessment_domains:
        description: 'Assessment domains to scan'
        required: true
        type: choice
        options:
          - 'Security'
          - 'Language Version'
          - 'Security + Language Version'
      severity_filter:
        description: 'Severity level to fix (for Milestone 2)'
        required: true
        default: 'mandatory'
        type: choice
        options:
          - mandatory
          - optional
          - potential
          - all

permissions:
  contents: read
  issues: write

jobs:
  create-assessment-issue:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      issue_url: ${{ steps.create-issue.outputs.issue_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create labels if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "security" --color "d73a4a" --description "Security related" 2>/dev/null || true
          gh label create "iso5055" --color "0052cc" --description "ISO 5055 compliance" 2>/dev/null || true
          gh label create "automated" --color "bfd4f2" --description "Automatically generated" 2>/dev/null || true
          gh label create "copilot" --color "7057ff" --description "For Copilot to handle" 2>/dev/null || true

      - name: Create GitHub Issue for Copilot
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEVERITY_FILTER: ${{ inputs.severity_filter || 'mandatory' }}
          ASSESSMENT_DOMAINS: ${{ inputs.assessment_domains || 'Security' }}
        run: |
          TITLE="🔒 [ISO5055] Run Assessment - REPORT ONLY"
          SEVERITY_UPPER=$(echo "$SEVERITY_FILTER" | tr '[:lower:]' '[:upper:]')

          # First create issue with placeholder, then update with actual number
          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body "Initializing..." \
            --label "security,iso5055,automated,copilot")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

          # Now update issue body with correct issue number
          gh issue edit $ISSUE_NUMBER --body "## Task: Run ISO 5055 Assessment

          **Agent:** \`security-assessment-reporter\`
          **Assessment Domains:** ${ASSESSMENT_DOMAINS}
          **Severity Filter:** ${SEVERITY_UPPER}

          ---

          ## 🎯 TARGET ISSUE FOR REPORT

          **Issue Number:** #${ISSUE_NUMBER}
          **Issue URL:** ${ISSUE_URL}

          ⚠️ **IMPORTANT:** Post your report as a comment on issue **#${ISSUE_NUMBER}** (this issue).

          ---

          ## Instructions

          Follow the instructions in \`.github/agents/security-assessment-reporter.md\`

          **Steps:**
          1. Call tool \`appmod-iso5055-security-assessment\` for each selected domain
          2. Format the results as markdown
          3. Post the report using the \`add_issue_comment\` MCP tool with issue_number=${ISSUE_NUMBER}

          ⛔ **DO NOT** fix code, create PRs, or close this issue."

          echo "✅ Created issue #$ISSUE_NUMBER: $ISSUE_URL"

      - name: Assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"

          echo "🤖 Assigning Copilot to issue #$ISSUE_NUMBER..."

          # Get issue node ID for GraphQL
          ISSUE_NODE_ID=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER --jq '.node_id')

          # Assign Copilot using GraphQL API with Copilot's bot node ID
          # BOT_kgDOC9w8XQ is the Copilot Coding Agent's node ID
          if gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -f query='mutation($issueId: ID!) {
              addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: ["BOT_kgDOC9w8XQ"]}) {
                clientMutationId
              }
            }' \
            -f issueId="$ISSUE_NODE_ID" 2>/dev/null; then
            echo "✅ Copilot assigned to issue #$ISSUE_NUMBER"
          else
            echo "⚠️ Could not assign Copilot. Please assign manually or enable Copilot Coding Agent."
          fi

      - name: Summary
        run: |
          echo "## 📋 ISO5055 Assessment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Issue Created:** #${{ steps.create-issue.outputs.issue_number }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** ${{ steps.create-issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY
          echo "🤖 **Copilot:** Assigned to run assessment" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Domains:** ${{ inputs.assessment_domains || 'Security' }}" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Severity Filter:** ${{ inputs.severity_filter || 'mandatory' }}" >> $GITHUB_STEP_SUMMARY
