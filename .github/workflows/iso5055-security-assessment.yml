name: "Evergreen Code Health Assessment"

on:
  # Manual trigger only
  workflow_dispatch:
    inputs:
      assessment_domains:
        description: 'Assessment domains to scan'
        required: true
        type: choice
        options:
          - 'Security'
          - 'Language Version'
          - 'Security + Language Version'
      severity_filter:
        description: 'Only report and fix issues at this severity level or higher'
        required: true
        default: 'mandatory'
        type: choice
        options:
          - mandatory
          - optional
          - potential
          - all

permissions:
  contents: read
  issues: write

jobs:
  create-assessment-issue:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      issue_url: ${{ steps.create-issue.outputs.issue_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create labels if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "security" --color "d73a4a" --description "Security related" 2>/dev/null || true
          gh label create "iso5055" --color "0052cc" --description "ISO 5055 compliance" 2>/dev/null || true
          gh label create "automated" --color "bfd4f2" --description "Automatically generated" 2>/dev/null || true
          gh label create "copilot" --color "7057ff" --description "For Copilot to handle" 2>/dev/null || true

      - name: Create GitHub Issue for Copilot
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEVERITY_FILTER: ${{ inputs.severity_filter || 'mandatory' }}
          ASSESSMENT_DOMAINS: ${{ inputs.assessment_domains || 'Security' }}
        run: |
          TITLE="🌲 [Evergreen] Code Health Assessment - ${ASSESSMENT_DOMAINS}"
          SEVERITY_UPPER=$(echo "$SEVERITY_FILTER" | tr '[:lower:]' '[:upper:]')

          # First create issue with placeholder, then update with actual number
          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body "Initializing..." \
            --label "security,iso5055,automated,copilot")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT

          # Build issue body dynamically
          BODY_FILE=$(mktemp)

          cat > "$BODY_FILE" <<EOF
          ## 🔍 ISO 5055 Assessment Task

          **Assessment Domains:** ${ASSESSMENT_DOMAINS}
          **Severity Filter:** ${SEVERITY_UPPER}
          **Target Issue:** #${ISSUE_NUMBER}

          ---

          ## 🤖 Instructions for Copilot

          You are a security assessment reporter. Your task is to run an ISO 5055 assessment and post the report to THIS issue.

          ### Step 1: Determine Which Assessments to Run

          Based on **Assessment Domains: ${ASSESSMENT_DOMAINS}**, you must:
          EOF

          # Add domain-specific instructions
          if [[ "${ASSESSMENT_DOMAINS}" == "Security" ]]; then
            cat >> "$BODY_FILE" <<'EOF'

          - ✅ Run Security assessment ONLY (call `appmod-iso5055-security-assessment` with domain="Security")
          - ❌ DO NOT run Language Version assessment
          EOF
          elif [[ "${ASSESSMENT_DOMAINS}" == "Language Version" ]]; then
            cat >> "$BODY_FILE" <<'EOF'

          - ✅ Run Language Version assessment ONLY (call `appmod-iso5055-security-assessment` with domain="Java Upgrade")
          - ❌ DO NOT run Security assessment
          EOF
          else
            cat >> "$BODY_FILE" <<'EOF'

          - ✅ Run Security assessment (call `appmod-iso5055-security-assessment` with domain="Security")
          - ✅ Run Language Version assessment (call `appmod-iso5055-security-assessment` with domain="Java Upgrade")
          EOF
          fi

          cat >> "$BODY_FILE" <<EOF

          ### Step 2: Filter Results by Severity

          **Severity Filter: ${SEVERITY_UPPER}** means you must:
          EOF

          # Add severity filter instructions
          case "${SEVERITY_UPPER}" in
            "MANDATORY")
              cat >> "$BODY_FILE" <<'EOF'

          - ✅ Include ONLY 🔴 Mandatory findings
          - ❌ Exclude 🟠 Optional, 🟡 Potential, and 🔵 Information findings
          EOF
              ;;
            "OPTIONAL")
              cat >> "$BODY_FILE" <<'EOF'

          - ✅ Include 🔴 Mandatory AND 🟠 Optional findings
          - ❌ Exclude 🟡 Potential and 🔵 Information findings
          EOF
              ;;
            "POTENTIAL")
              cat >> "$BODY_FILE" <<'EOF'

          - ✅ Include 🔴 Mandatory, 🟠 Optional, AND 🟡 Potential findings
          - ❌ Exclude 🔵 Information findings
          EOF
              ;;
            "ALL")
              cat >> "$BODY_FILE" <<'EOF'

          - ✅ Include all findings (🔴 Mandatory + 🟠 Optional + 🟡 Potential + 🔵 Information)
          EOF
              ;;
          esac

          cat >> "$BODY_FILE" <<'EOF'

          ### Step 3: Format the Report

          Your report MUST start with:
          \`\`\`markdown
          <!-- ASSESSMENT_VERIFIED -->
          ## 📊 ISO 5055 Assessment Report

          **Assessment Date:** [today's date]
          **Repository:** Caoxuyang/PhotoAlbum-Java
          **Assessment Domains:** [MUST match the domains from this issue]
          **Severity Filter:** [MUST match the filter from this issue]
          \`\`\`

          ### Step 4: Post the Report

          Use the \`add_issue_comment\` MCP tool to post your report:
          - **issue_number:** ${ISSUE_NUMBER}
          - **body:** Your formatted markdown report

          **IMPORTANT:** This is a READ-ONLY assessment task. Post the report as a comment and STOP.

          ---

          ## ⚠️ Critical Requirements

          - ✅ ONLY assess the domains specified: ${ASSESSMENT_DOMAINS}
          - ✅ ONLY include findings matching severity filter: ${SEVERITY_UPPER}
          - ✅ Post report to issue #${ISSUE_NUMBER} using \`add_issue_comment\` MCP tool
          - ❌ DO NOT fix code, create PRs, or close this issue
          - ❌ DO NOT create pull requests - this is assessment ONLY
          - ❌ DO NOT modify any source code files
          - ❌ DO NOT include findings from other domains
          - ❌ DO NOT include findings below the severity threshold

          ## 📝 Your Task Summary

          1. Call \`appmod-iso5055-security-assessment\` tool for the specified domain(s)
          2. Filter results by severity level
          3. Format as markdown report
          4. Post comment to issue #${ISSUE_NUMBER} using \`add_issue_comment\`
          5. STOP - do not create PRs or fix code
          EOF

          # Update the issue with the dynamically built body
          gh issue edit $ISSUE_NUMBER --body-file "$BODY_FILE"
          rm "$BODY_FILE"

          echo "✅ Created issue #$ISSUE_NUMBER: $ISSUE_URL"

      - name: Assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"

          echo "🤖 Assigning Copilot to issue #$ISSUE_NUMBER..."

          # Get issue node ID for GraphQL
          ISSUE_NODE_ID=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER --jq '.node_id')

          # Assign Copilot using GraphQL API with Copilot's bot node ID
          # BOT_kgDOC9w8XQ is the Copilot Coding Agent's node ID
          if gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support" \
            -f query='mutation($issueId: ID!) {
              addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: ["BOT_kgDOC9w8XQ"]}) {
                clientMutationId
              }
            }' \
            -f issueId="$ISSUE_NODE_ID" 2>/dev/null; then
            echo "✅ Copilot assigned to issue #$ISSUE_NUMBER"
          else
            echo "⚠️ Could not assign Copilot. Please assign manually or enable Copilot Coding Agent."
          fi

      - name: Summary
        run: |
          echo "## 📋 Evergreen Assessment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Issue Created:** #${{ steps.create-issue.outputs.issue_number }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** ${{ steps.create-issue.outputs.issue_url }}" >> $GITHUB_STEP_SUMMARY
          echo "🤖 **Copilot:** Assigned to run assessment" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Domains:** ${{ inputs.assessment_domains || 'Security' }}" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Severity Filter:** ${{ inputs.severity_filter || 'mandatory' }}" >> $GITHUB_STEP_SUMMARY
