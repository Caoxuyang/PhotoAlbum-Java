name: "Evergreen Remediator"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  process-report:
    runs-on: ubuntu-latest
    # Multi-layer validation to prevent false triggers
    # NOTE: Comments are posted via MCP using PAT_TOKEN, so author is the PAT owner (not Copilot bot)
    # We validate using: issue labels + report content markers instead of comment author
    if: |
      contains(github.event.issue.labels.*.name, 'iso5055') &&
      contains(github.event.issue.labels.*.name, 'automated') &&
      (contains(github.event.comment.body, '## 📊 ISO 5055 Assessment Report') || contains(github.event.comment.body, '## 📊 ISO 5055 Security Assessment Report')) &&
      contains(github.event.comment.body, '<!-- ASSESSMENT_VERIFIED -->')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate report structure
        id: validate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "🔍 Validating report structure..."

          # Check for required sections (flexible matching)
          # Report uses "### 📋 Executive Summary" not "### Summary"
          if ! echo "$COMMENT_BODY" | grep -q "Summary"; then
            echo "❌ Invalid report format - missing Summary section"
            exit 1
          fi

          # Check for findings section (any severity level)
          if ! echo "$COMMENT_BODY" | grep -qE "Mandatory|Optional|Potential"; then
            echo "❌ Invalid report format - missing findings section"
            exit 1
          fi

          # Check for either CWE entries (security) OR finding IDs (language version)
          if ! echo "$COMMENT_BODY" | grep -qE "CWE-|####.*:"; then
            echo "❌ Invalid report format - no findings found"
            exit 1
          fi

          echo "✅ Report validated"

      - name: Extract severity filter and domains
        id: extract-filter
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Extract severity filter from report
          FILTER=$(echo "$COMMENT_BODY" | grep -oP '\*\*Severity Filter:\*\* \K\w+' || echo "MANDATORY")
          echo "severity_filter=$FILTER" >> $GITHUB_OUTPUT
          echo "📋 Severity filter: $FILTER"

          # Extract assessment domains from report
          DOMAINS=$(echo "$COMMENT_BODY" | grep -oP '\*\*Assessment Domains:\*\* \K.*' || echo "Security")
          echo "domains=$DOMAINS" >> $GITHUB_OUTPUT
          echo "📊 Assessment domains: $DOMAINS"

      - name: Parse findings and create sub-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PARENT_ISSUE: ${{ github.event.issue.number }}
          SEVERITY_FILTER: ${{ steps.extract-filter.outputs.severity_filter }}
          DOMAINS: ${{ steps.extract-filter.outputs.domains }}
        run: |
          echo "📊 Processing findings from issue #$PARENT_ISSUE..."
          echo "🎯 Filtering for: $SEVERITY_FILTER"
          echo "📋 Domains: $DOMAINS"

          # Save comment to file for parsing
          echo "$COMMENT_BODY" > /tmp/report.md

          # Create labels for sub-issues
          gh label create "security-fix" --color "d73a4a" --description "Security fix task" 2>/dev/null || true
          gh label create "language-upgrade" --color "0e8a16" --description "Language version upgrade task" 2>/dev/null || true
          gh label create "copilot-fix" --color "7057ff" --description "For Copilot to fix" 2>/dev/null || true

          # Build list of sections to include based on filter
          case "$SEVERITY_FILTER" in
            "MANDATORY")
              SECTIONS="Mandatory"
              ;;
            "OPTIONAL")
              SECTIONS="Mandatory|Optional"
              ;;
            "POTENTIAL")
              SECTIONS="Mandatory|Optional|Potential"
              ;;
            "ALL"|*)
              SECTIONS="Mandatory|Optional|Potential|Information"
              ;;
          esac

          echo "📋 Processing sections matching: $SECTIONS"

          # Extract all findings (both CWE and non-CWE) from matching sections
          awk -v sections="$SECTIONS" '
            BEGIN { in_section = 0 }
            /^### .*(Mandatory|Optional|Potential|Information) Findings/ {
              in_section = 0
              if (match($0, sections)) {
                in_section = 1
                print "SECTION: " $0 > "/dev/stderr"
              }
            }
            /^#### .*:/ && in_section {
              print $0
            }
          ' /tmp/report.md > /tmp/finding_entries.txt

          echo "Found $(wc -l < /tmp/finding_entries.txt) finding entries to process"

          # Detect Language Version upgrade group (Java + Spring Boot + Jakarta)
          HAS_JAVA_UPGRADE=$(grep -c "^#### UPGRADE-JAVA-VERSION:" /tmp/finding_entries.txt || true)
          HAS_SPRING_UPGRADE=$(grep -c "^#### UPGRADE-SPRING-BOOT:" /tmp/finding_entries.txt || true)
          HAS_JAKARTA_UPGRADE=$(grep -c "^#### UPGRADE-JAKARTA-NAMESPACE:" /tmp/finding_entries.txt || true)

          # If we have Java + Spring Boot upgrades, create ONE combined sub-issue
          if [[ $HAS_JAVA_UPGRADE -gt 0 ]] && [[ $HAS_SPRING_UPGRADE -gt 0 ]]; then
            echo "🔗 Detected interdependent upgrades: Java + Spring Boot (+ Jakarta if present)"
            echo "Creating combined sub-issue for full upgrade path..."

            # Extract evidence from all related findings
            JAVA_EVIDENCE=$(grep -A 5 "^#### UPGRADE-JAVA-VERSION:" /tmp/report.md | grep "Evidence:" | sed 's/.*Evidence:\*\* //')
            SPRING_EVIDENCE=$(grep -A 5 "^#### UPGRADE-SPRING-BOOT:" /tmp/report.md | grep "Evidence:" | sed 's/.*Evidence:\*\* //')

            JAKARTA_SECTION=""
            if [[ $HAS_JAKARTA_UPGRADE -gt 0 ]]; then
              JAKARTA_EVIDENCE=$(grep -A 5 "^#### UPGRADE-JAKARTA-NAMESPACE:" /tmp/report.md | grep "Evidence:" | sed 's/.*Evidence:\*\* //')
              JAKARTA_SECTION="
          3. **Jakarta Namespace Migration** (required for Spring Boot 3.x):
             - Evidence: $JAKARTA_EVIDENCE
             - Migrate \`javax.persistence.*\` → \`jakarta.persistence.*\`
             - Migrate \`javax.validation.*\` → \`jakarta.validation.*\`
          "
            fi

            SUB_ISSUE_BODY=$(cat <<EOF
          ## ⬆️ Language Version Upgrade: Java 8 → 21 + Spring Boot 2.7 → 3.x

          **Parent Issue:** #$PARENT_ISSUE
          **Upgrade Type:** Full Stack Modernization (Java Runtime + Framework)
          **Category:** Language Version / Interdependent Upgrades

          ---

          ### 🎯 Upgrade Path

          These upgrades **MUST be done together in a single PR** because Spring Boot 3.x requires Java 17+ and jakarta.* namespaces:

          1. **Java Runtime Upgrade**:
             - Evidence: $JAVA_EVIDENCE
             - Upgrade from Java 8 → Java 21 (LTS)

          2. **Spring Boot Framework Upgrade**:
             - Evidence: $SPRING_EVIDENCE
             - Upgrade from Spring Boot 2.7.18 → Spring Boot 3.4.x (latest stable)
          ${JAKARTA_SECTION}
          ---

          ### 🤖 Instructions for Copilot

          You are a language version upgrade agent. Your task is to perform this **interdependent full-stack upgrade** using the \`appmod-run-task\` MCP tool.

          ⚠️ **CRITICAL:** These upgrades are interdependent. Spring Boot 3.x requires Java 17+ and jakarta.* namespaces. All changes MUST be in ONE PR.

          #### Step 1: Use the appmod-run-task Tool

          Call the \`appmod-run-task\` tool with this task description:

          \`\`\`
          Upgrade project from Java 8 + Spring Boot 2.7.18 to Java 21 + Spring Boot 3.4.x with jakarta.* namespace migration

          Evidence:
          - Java version: $JAVA_EVIDENCE
          - Spring Boot version: $SPRING_EVIDENCE

          This is a full-stack upgrade. You MUST:
          1. Upgrade Java version in pom.xml from 1.8 to 21
          2. Upgrade Spring Boot parent version from 2.7.18 to 3.4.x (latest stable)
          3. Migrate ALL javax.* imports to jakarta.* namespaces (required for Spring Boot 3.x)

          Scan the entire codebase for ALL occurrences that need upgrading.
          \`\`\`

          #### Step 2: Create Single Pull Request

          After the tool provides the upgrade guidance:
          1. Implement ALL recommended changes in ONE commit/PR
          2. Create a PR with title: \`⬆️ [UPGRADE] Java 8→21 + Spring Boot 2.7→3.x Full Stack Modernization\`
          3. Reference this issue in the PR description: \`Fixes #ISSUE_NUMBER\`

          #### Requirements

          - ✅ Use \`appmod-run-task\` MCP tool for guidance
          - ✅ **Single PR** with all three changes (Java + Spring Boot + jakarta.*)
          - ✅ Verify build passes after all changes
          - ✅ Verify tests pass after all changes
          - ❌ Do NOT split into multiple PRs (these are interdependent!)
          EOF
            )

            SUB_ISSUE_TITLE="⬆️ [UPGRADE] Java 8→21 + Spring Boot 2.7→3.x Full Stack Modernization"
            LABELS="language-upgrade,copilot-fix,iso5055"

            echo "Creating combined upgrade sub-issue..."
            SUB_ISSUE_URL=$(gh issue create \
              --title "$SUB_ISSUE_TITLE" \
              --body "$SUB_ISSUE_BODY" \
              --label "$LABELS")

            SUB_ISSUE_NUMBER=$(echo "$SUB_ISSUE_URL" | grep -oE '[0-9]+$')
            echo "✅ Created combined sub-issue #$SUB_ISSUE_NUMBER for Java + Spring Boot upgrade"
            echo "$SUB_ISSUE_NUMBER" >> /tmp/sub_issues.txt

            # Remove Language Version findings from the list so they don't get processed individually
            grep -v "^#### UPGRADE-" /tmp/finding_entries.txt > /tmp/finding_entries_filtered.txt || true
            mv /tmp/finding_entries_filtered.txt /tmp/finding_entries.txt
          fi

          # Process remaining individual findings (Security CWEs or standalone Language findings)
          while read -r line; do
            [[ -z "$line" ]] && continue

            # Check if this is a CWE (Security) or other finding (Language Version)
            if echo "$line" | grep -q "^#### CWE-"; then
              # Security finding
              FINDING_ID=$(echo "$line" | grep -oP 'CWE-\d+')
              FINDING_NAME=$(echo "$line" | sed 's/^#### CWE-[0-9]*: //')
              FINDING_TYPE="Security"
              ISSUE_EMOJI="🔒"
              LABELS="security-fix,copilot-fix,iso5055"

              echo "Found Security: $FINDING_ID - $FINDING_NAME"
            else
              # Standalone Language version finding (shouldn't happen if grouping worked)
              FINDING_ID=$(echo "$line" | grep -oP '^#### \K[^:]+')
              FINDING_NAME=$(echo "$line" | sed 's/^#### [^:]*: //')
              FINDING_TYPE="Language Version"
              ISSUE_EMOJI="⬆️"
              LABELS="language-upgrade,copilot-fix,iso5055"

              echo "Found standalone Language Version: $FINDING_ID - $FINDING_NAME"
            fi

            # Extract details for this finding (next few lines after the header)
            DETAILS=$(grep -A 4 "^#### $FINDING_ID:" /tmp/report.md | tail -3)
            CATEGORY=$(echo "$DETAILS" | grep "Category:" | sed 's/.*Category:\*\* //')
            EVIDENCE=$(echo "$DETAILS" | grep "Evidence:" | sed 's/.*Evidence:\*\* //')

            # Create sub-issue for this finding
            if [ "$FINDING_TYPE" = "Security" ]; then
              SUB_ISSUE_BODY=$(cat <<EOF
          ## 🔧 Fix Security Vulnerability: $FINDING_ID

          **Parent Issue:** #$PARENT_ISSUE
          **CWE:** $FINDING_ID - $FINDING_NAME
          **Category:** $CATEGORY

          ---

          ### Evidence

          $EVIDENCE

          ---

          ### 🤖 Instructions for Copilot

          You are a security fixer agent. Your task is to fix this specific vulnerability using the \`appmod-run-task\` MCP tool.

          #### Step 1: Use the appmod-run-task Tool

          Call the \`appmod-run-task\` tool with this task description:

          \`\`\`
          Fix $FINDING_ID vulnerability: $FINDING_NAME

          Evidence: $EVIDENCE

          Scan the entire codebase for ALL occurrences of this vulnerability pattern (not just the example shown).
          Apply the fix to all locations found.
          \`\`\`

          #### Step 2: Create Pull Request

          After the tool provides the fix:
          1. Implement the recommended changes
          2. Create a PR with title: \`🔒 Fix $FINDING_ID: $FINDING_NAME\`
          3. Reference this issue in the PR description: \`Fixes #ISSUE_NUMBER\`

          #### Requirements

          - ✅ Use \`appmod-run-task\` MCP tool for guidance
          - ✅ Scan for ALL occurrences (not just the one in evidence)
          - ✅ Fix ONLY this vulnerability ($FINDING_ID)
          - ❌ Do NOT fix other unrelated issues in the same PR
          EOF
              )

              SUB_ISSUE_TITLE="🔒 [$FINDING_ID] Fix: $FINDING_NAME"
            else
              # Determine specific task based on Finding ID
              case "$FINDING_ID" in
                UPGRADE-JAVA-VERSION*)
                  TASK_DESC="Upgrade project from Java 8 to Java 21 (LTS)"
                  ;;
                UPGRADE-SPRING-BOOT*)
                  TASK_DESC="Upgrade Spring Boot from 2.7.x to 3.2.x (latest stable)"
                  ;;
                UPGRADE-JAKARTA-NAMESPACE*)
                  TASK_DESC="Migrate javax.* imports to jakarta.* namespaces"
                  ;;
                *)
                  TASK_DESC="Upgrade this project to the latest Java version"
                  ;;
              esac

              SUB_ISSUE_BODY=$(cat <<EOF
          ## 🔧 Language Version Upgrade: $FINDING_ID

          **Parent Issue:** #$PARENT_ISSUE
          **Finding:** $FINDING_ID - $FINDING_NAME
          **Category:** $CATEGORY

          ---

          ### Evidence

          $EVIDENCE

          ---

          ### 🤖 Instructions for Copilot

          You are a language version upgrade agent. Your task is to upgrade this project using the \`appmod-run-task\` MCP tool.

          #### Step 1: Use the appmod-run-task Tool

          Call the \`appmod-run-task\` tool with this task description:

          \`\`\`
          $TASK_DESC

          Evidence: $EVIDENCE

          Scan the entire codebase for ALL occurrences that need upgrading (not just the example shown).
          Apply the upgrade to all locations found.
          \`\`\`

          #### Step 2: Create Pull Request

          After the tool provides the upgrade guidance:
          1. Implement the recommended changes
          2. Create a PR with title: \`⬆️ [$FINDING_ID] $FINDING_NAME\`
          3. Reference this issue in the PR description: \`Fixes #ISSUE_NUMBER\`

          #### Requirements

          - ✅ Use \`appmod-run-task\` MCP tool for guidance
          - ✅ Scan for ALL occurrences (not just the one in evidence)
          - ✅ Fix ONLY this specific finding ($FINDING_ID)
          - ❌ Do NOT fix other unrelated issues in the same PR
          EOF
              )

              SUB_ISSUE_TITLE="⬆️ [$FINDING_ID] Upgrade: $FINDING_NAME"
            fi

            echo "Creating sub-issue for $FINDING_ID..."
            SUB_ISSUE_URL=$(gh issue create \
              --title "$SUB_ISSUE_TITLE" \
              --body "$SUB_ISSUE_BODY" \
              --label "$LABELS")

            SUB_ISSUE_NUMBER=$(echo "$SUB_ISSUE_URL" | grep -oE '[0-9]+$')
            echo "✅ Created sub-issue #$SUB_ISSUE_NUMBER for $FINDING_ID"

            # Store for Copilot assignment
            echo "$SUB_ISSUE_NUMBER" >> /tmp/sub_issues.txt
          done < /tmp/finding_entries.txt

          echo "📋 Sub-issues created. Count: $(wc -l < /tmp/sub_issues.txt 2>/dev/null || echo 0)"

      - name: Assign Copilot to sub-issues
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
        run: |
          if [[ ! -f /tmp/sub_issues.txt ]]; then
            echo "⚠️ No sub-issues to assign"
            exit 0
          fi

          while read -r ISSUE_NUMBER; do
            echo "🤖 Assigning Copilot to issue #$ISSUE_NUMBER..."

            # Get issue node ID for GraphQL
            ISSUE_NODE_ID=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER --jq '.node_id')

            # Assign Copilot using GraphQL API
            if gh api graphql \
              -H "GraphQL-Features: issues_copilot_assignment_api_support" \
              -f query='mutation($issueId: ID!) {
                addAssigneesToAssignable(input: {assignableId: $issueId, assigneeIds: ["BOT_kgDOC9w8XQ"]}) {
                  clientMutationId
                }
              }' \
              -f issueId="$ISSUE_NODE_ID" 2>/dev/null; then
              echo "✅ Copilot assigned to issue #$ISSUE_NUMBER"
            else
              echo "⚠️ Could not assign Copilot to #$ISSUE_NUMBER"
            fi

            # Small delay to avoid rate limiting
            sleep 2
          done < /tmp/sub_issues.txt

      - name: Post summary to parent issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PARENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          if [[ ! -f /tmp/sub_issues.txt ]]; then
            gh issue comment $PARENT_ISSUE --body "⚠️ No findings matched the severity filter. No sub-issues created."
            exit 0
          fi

          SUB_ISSUE_COUNT=$(wc -l < /tmp/sub_issues.txt)
          SUB_ISSUE_LIST=$(cat /tmp/sub_issues.txt | while read num; do echo "- #$num"; done)

          gh issue comment $PARENT_ISSUE --body "## 🚀 Milestone 2: Security Fixes Initiated

          **Sub-issues created:** $SUB_ISSUE_COUNT
          **Copilot assigned:** Yes

          ### Sub-issues

          $SUB_ISSUE_LIST

          Each sub-issue has been assigned to Copilot for automated fixing.
          PRs will be created for each vulnerability fix."

      - name: Summary
        run: |
          echo "## 🔧 ISO5055 Security Fixer (Milestone 2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Report Validated**" >> $GITHUB_STEP_SUMMARY
          echo "📋 **Parent Issue:** #${{ github.event.issue.number }}" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Severity Filter:** ${{ steps.extract-filter.outputs.severity_filter }}" >> $GITHUB_STEP_SUMMARY
          if [[ -f /tmp/sub_issues.txt ]]; then
            echo "🔢 **Sub-issues Created:** $(wc -l < /tmp/sub_issues.txt)" >> $GITHUB_STEP_SUMMARY
          fi
